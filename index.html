<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mentimeter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --menti-blue: #1261fe;
            --text-main: #222222;
            --text-muted: #666666;
            --border-light: #dcdcdc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px; /* Perfekt für mobile Bildschirme */
            padding: 30px 24px;
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Originalgetreues Mentimeter Logo */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 40px;
        }

        .logo-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 20px;
        }
        
        .logo-bars div { width: 4px; border-radius: 2px; }
        .bar-red { height: 12px; background-color: #e91e63; }
        .bar-blue { height: 16px; background-color: #2196f3; }
        .bar-yellow { height: 20px; background-color: #ffc107; }
        
        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.3;
            margin-top: 0;
            margin-bottom: 24px;
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* Menti Input Felder */
        .input-wrapper {
            position: relative;
            margin-bottom: 12px;
        }

        .input-wrapper input {
            width: 100%;
            height: 52px;
            padding: 12px 45px 12px 16px;
            border: 2px solid var(--border-light);
            border-radius: 4px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            box-sizing: border-box;
            transition: border-color 0.2s;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--menti-blue);
        }

        .input-wrapper input::placeholder {
            color: #999;
        }

        /* Die typische Zeichenbegrenzung am rechten Rand */
        .char-counter {
            position: absolute;
            right: 16px;
            top: 17px;
            font-size: 12px;
            font-weight: 600;
            color: #a0a0a0;
        }

        .help-text {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin: 20px 0;
        }

        .btn {
            width: 100%;
            height: 52px;
            background-color: var(--menti-blue);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.2s;
        }
        
        .btn:hover { background-color: #0b4fe6; }
        .btn:disabled { background-color: #a0bdfa; cursor: not-allowed; }

        .error-text {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 8px;
            display: none;
            font-weight: 600;
        }

        /* Loading Spinner */
        .spinner-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--menti-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .footer {
            margin-top: auto;
            padding-top: 40px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--menti-blue);
            text-decoration: none;
        }

        /* Bestätigungs-Screen (Nach dem Abstimmen) */
        .success-icon {
            font-size: 48px;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <div class="logo-bars">
            <div class="bar-red"></div>
            <div class="bar-blue"></div>
            <div class="bar-yellow"></div>
        </div>
        <div class="logo-text">Mentimeter</div>
    </div>

    <div id="view-verification">
        <h1>Sicherheitsprüfung</h1>
        <p class="subtitle">Bitte bestätige dein Alter, um an dieser Umfrage teilzunehmen.</p>
        
        <div class="input-wrapper">
            <input type="date" id="birthdate" max="2010-01-01">
        </div>
        <div class="error-text" id="date-error">Bitte wähle ein gültiges Datum.</div>
        
        <button class="btn" onclick="verifyHuman()" style="margin-top: 10px;">Verifizieren</button>
    </div>

    <div id="view-loading" class="spinner-container">
        <div class="spinner"></div>
        <p style="margin-top: 24px; font-weight: 600;
